spring:
  datasource:
    # Подключение к уже запущенному внешнему PostgreSQL-контейнеру.
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # Для MVP разрешаем автосоздание/обновление схемы.
      ddl-auto: update
    open-in-view: false

server:
  # Порт backend-приложения.
  port: ${APP_PORT:8080}

easy-wireguard:
  # URL удалённого API easy-wireguard.
  base-url: ${EW_API_BASE_URL:http://localhost:51821}
  # Токен доступа к API.
  token: ${EW_API_TOKEN:change-me}
