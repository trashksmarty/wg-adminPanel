<!doctype html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy WireGuard Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-body-tertiary">
  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
      <h1 class="h3 m-0">Админка Easy WireGuard</h1>
      <button id="refresh" class="btn btn-outline-light">Обновить</button>
    </div>

    <section class="card shadow-sm border-0 mb-4 bg-dark-subtle">
      <div class="card-body">
        <h2 class="h5 mb-3">Создать туннель</h2>
        <form id="create-form" class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Префикс</label>
            <select class="form-select" name="prefix" id="prefix-select" required></select>
          </div>
          <div class="col-md-5">
            <label class="form-label">Название</label>
            <input class="form-control" name="name" required />
          </div>
          <div class="col-md-4">
            <label class="form-label">Активен до</label>
            <input class="form-control" type="datetime-local" name="expiresAt" required />
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary">Создать</button>
          </div>
        </form>
      </div>
    </section>

    <section class="card shadow-sm border-0 bg-dark-subtle">
      <div class="card-body">
        <h2 class="h5 mb-3">Список туннелей</h2>
        <div class="table-responsive">
          <table class="table table-dark table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>ID</th>
                <th>Название</th>
                <th>ID в easy-wireguard</th>
                <th>Статус</th>
                <th>Активен до</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="tunnel-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <template id="tunnel-row-template">
    <tr>
      <td data-field="id"></td>
      <td data-field="name"></td>
      <td data-field="externalTunnelId"></td>
      <td data-field="active"></td>
      <td>
        <div class="d-flex gap-2 flex-wrap">
          <input data-field="expiresAtInput" type="datetime-local" class="form-control form-control-sm w-auto" />
          <button data-action="save-expire" class="btn btn-sm btn-outline-info">Сохранить</button>
        </div>
      </td>
      <td>
        <button data-action="toggle" class="btn btn-sm btn-outline-warning"></button>
      </td>
    </tr>
  </template>

  <script src="app.js"></script>
</body>
</html>
