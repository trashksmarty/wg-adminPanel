version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: wg-admin-postgres
    environment:
      POSTGRES_DB: wg_admin
      POSTGRES_USER: wg_admin
      POSTGRES_PASSWORD: wg_admin
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
